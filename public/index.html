<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — File Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PrismJS for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #0b0b0b;
            --surface: #141414;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f5;
            --text-dim: #737373;
            --accent: #3b82f6;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 80px 48px;
        }

        header {
            margin-bottom: 80px;
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .section-header {
            margin: 60px 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            height: 1px;
            width: 30px;
            background: var(--border);
        }

        /* 3-Column Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* Card Style - Reference Image Style */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: #1a1a1a;
            transform: translateY(-2px);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .card:hover .card-icon {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Action Buttons on Hover */
        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .btn-mini {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mini:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-mini.danger:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Upload Zone */
        .upload-area {
            grid-column: 1 / -1;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.02);
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        #status-container {
            margin-top: 16px;
            grid-column: 1 / -1;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            background: var(--surface);
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease-out;
        }

        .status-pill.success {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .status-pill.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Stats */
        .stats-info {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .empty-state {
            grid-column: 1 / -1;
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-width: 90%;
            max-height: 90vh;
            width: 900px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: #0f0f0f;
        }

        .modal-filename {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .modal-btn:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.03);
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 20px;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--text-main);
        }

        .modal-body {
            flex: 1;
            overflow: auto;
            background: var(--bg);
        }

        .code-viewer {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 20px !important;
            margin: 0 !important;
            background: transparent !important;
        }

        /* Prism Overrides */
        pre[class*="language-"].line-numbers {
            padding-left: 3.8em;
            counter-reset: linenumber;
        }

        .line-numbers .line-numbers-rows {
            border-right: 1px solid var(--border) !important;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 20px;
        }

        .preview-text {
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 24px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <i data-lucide="box" size="20"></i>
                Vault
            </div>
        </header>

        <section>
            <div class="section-header">
                <h2 class="section-title">Upload</h2>
            </div>
            <div class="grid">
                <div class="upload-area" id="uploadZone">
                    <input type="file" id="fileInput" multiple style="display: none;">
                    <i data-lucide="cloud-upload" size="32" style="margin-bottom: 12px; color: var(--text-dim);"></i>
                    <p style="font-size: 14px; font-weight: 500;">Drop files here to host</p>
                    <p style="font-size: 12px; color: var(--text-dim); margin-top: 4px;">Max 25MB per file</p>
                </div>
                <div id="status-container"></div>
            </div>
        </section>

        <section id="librarySection">
            <div class="section-header">
                <h2 class="section-title">Library</h2>
                <div class="stats-info">
                    <span id="fileCount">0</span> Files — <span id="totalSize">0 B</span>
                </div>
            </div>

            <div style="margin-bottom: 32px;">
                <input type="text" id="searchInput" placeholder="Search files..." style="
                        width: 100%;
                        background: var(--surface);
                        border: 1px solid var(--border);
                        border-radius: 6px;
                        padding: 12px 16px;
                        color: var(--text-main);
                        font-size: 14px;
                        font-family: 'Inter', sans-serif;
                        transition: var(--transition);
                    " />
                <style>
                    #searchInput:focus {
                        outline: none;
                        border-color: var(--accent);
                        background: #1a1a1a;
                    }

                    #searchInput::placeholder {
                        color: var(--text-dim);
                    }
                </style>
            </div>

            <div class="grid" id="fileList">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <div>No files yet. Upload something to get started.</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-filename">
                    <i data-lucide="file" size="16"></i>
                    <span id="modalFilename">file.txt</span>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn" id="copyBtn" onclick="copyCurrentFileContent()" style="display: none;">
                        <i data-lucide="copy" size="14"></i>
                        Copy
                    </button>
                    <button class="modal-btn" onclick="downloadCurrentFile()">
                        <i data-lucide="download" size="14"></i>
                        Download
                    </button>
                    <button class="modal-close" onclick="closePreview()">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const statusContainer = document.getElementById('status-container');
        const fileList = document.getElementById('fileList');
        const fileCountSpan = document.getElementById('fileCount');
        const totalSizeSpan = document.getElementById('totalSize');
        const searchInput = document.getElementById('searchInput');

        let allFiles = [];

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filterAndDisplayFiles(query);
        });

        function filterAndDisplayFiles(query) {
            if (query === '') {
                displayFiles(allFiles);
                return;
            }

            const filtered = allFiles.filter(file =>
                file.name.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>No files matching "${query}"</div>
                    </div>
                `;
                return;
            }

            displayFiles(filtered);
        }

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            for (let file of files) {
                await uploadFile(file);
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const pill = document.createElement('div');
            pill.className = 'status-pill';
            pill.innerHTML = `<i data-lucide="loader-2" size="14"></i><span>Uploading ${file.name}...</span>`;
            statusContainer.innerHTML = '';
            statusContainer.appendChild(pill);
            lucide.createIcons();

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    pill.className = 'status-pill success';
                    pill.innerHTML = `<i data-lucide="check-circle-2" size="14" style="color: #22c55e"></i><span>${file.name} uploaded</span>`;
                    lucide.createIcons();
                    loadFiles();
                } else {
                    pill.className = 'status-pill error';
                    pill.innerHTML = `<i data-lucide="alert-circle" size="14" style="color: #ef4444"></i><span>Error: ${data.error}</span>`;
                    lucide.createIcons();
                }
            } catch (error) {
                pill.className = 'status-pill error';
                pill.innerHTML = `<i data-lucide="alert-circle" size="14" style="color: #ef4444"></i><span>Network error</span>`;
                lucide.createIcons();
            }

            setTimeout(() => pill.remove(), 4000);
        }

        async function loadFiles() {
            try {
                const response = await fetch('/files');
                const data = await response.json();

                if (data.files.length === 0) {
                    fileList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📂</div>
                            <div>No files yet. Upload something to get started.</div>
                        </div>
                    `;
                    updateStats(0, 0);
                    allFiles = [];
                    return;
                }

                // Only re-render if the file list has changed
                const newFilesJson = JSON.stringify(data.files);
                const oldFilesJson = JSON.stringify(allFiles);
                
                if (newFilesJson !== oldFilesJson) {
                    allFiles = data.files;
                    displayFiles(allFiles);
                    updateStats(allFiles.length, allFiles.reduce((sum, f) => sum + f.size, 0));
                }
            } catch (err) {
                console.error(err);
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div>Error loading files</div>
                    </div>
                `;
            }
        }

        function displayFiles(files) {
            if (files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <div>No files found.</div>
                    </div>
                `;
                return;
            }

            fileList.innerHTML = files.map(file => {
                const fileName = file.name.replace(/'/g, "\\'");
                return `
                    <div class="card">
                        <div class="card-icon">
                            <i data-lucide="${getFileIconName(file.name)}"></i>
                        </div>
                        <div class="card-content" style="cursor: pointer;" onclick="downloadFile('${file.url}', '${fileName}')">
                            <span class="card-title" title="${file.name}">${file.name}</span>
                            <span class="card-meta">${formatBytes(file.size)}</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-mini" title="Download" onclick="event.stopPropagation(); downloadFile('${file.url}', '${fileName}')">
                                <i data-lucide="download" size="16"></i>
                            </button>
                            <button class="btn-mini" title="Preview" onclick="event.stopPropagation(); previewFile('${file.url}', '${fileName}', '${file.name}')">
                                <i data-lucide="eye" size="16"></i>
                            </button>
                            <button class="btn-mini danger" title="Delete" onclick="event.stopPropagation(); deleteFile('${file.messageId}')">
                                <i data-lucide="trash-2" size="16"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function updateStats(count, bytes) {
            fileCountSpan.textContent = count;
            totalSizeSpan.textContent = formatBytes(bytes);
        }

        function getFileIconName(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const map = {
                'pdf': 'file-pdf',
                'doc': 'file-text', 'docx': 'file-text', 'txt': 'file-text',
                'jpg': 'image', 'jpeg': 'image', 'png': 'image', 'gif': 'image', 'webp': 'image',
                'zip': 'archive', 'rar': 'archive', '7z': 'archive',
                'mp3': 'music', 'wav': 'music', 'flac': 'music',
                'mp4': 'video', 'mkv': 'video', 'avi': 'video',
                'xls': 'table', 'xlsx': 'table', 'csv': 'table'
            };
            return map[ext] || 'file';
        }

        async function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function deleteFile(messageId) {
            if (!confirm('Delete this file permanently?')) return;

            const pill = document.createElement('div');
            pill.className = 'status-pill';
            pill.innerHTML = `<i data-lucide="loader-2" size="14"></i><span>Deleting...</span>`;
            statusContainer.innerHTML = '';
            statusContainer.appendChild(pill);
            lucide.createIcons();

            try {
                const res = await fetch(`/files/${messageId}`, { method: 'DELETE' });
                const data = await res.json();

                if (res.ok) {
                    pill.className = 'status-pill success';
                    pill.innerHTML = `<i data-lucide="check-circle-2" size="14" style="color: #22c55e"></i><span>File deleted</span>`;
                    lucide.createIcons();
                    loadFiles();
                } else {
                    pill.className = 'status-pill error';
                    pill.innerHTML = `<i data-lucide="alert-circle" size="14" style="color: #ef4444"></i><span>Error: ${data.error}</span>`;
                    lucide.createIcons();
                }
            } catch (error) {
                pill.className = 'status-pill error';
                pill.innerHTML = `<i data-lucide="alert-circle" size="14" style="color: #ef4444"></i><span>Network error</span>`;
                lucide.createIcons();
            }

            setTimeout(() => pill.remove(), 4000);
        }

        let currentPreviewFile = { url: '', name: '' };

        async function previewFile(url, filename, originalName) {
            currentPreviewFile = { url, name: filename, content: '' };
            const modal = document.getElementById('previewModal');
            const modalBody = document.getElementById('modalBody');
            const modalFilename = document.getElementById('modalFilename');
            const copyBtn = document.getElementById('copyBtn');

            modalFilename.textContent = originalName;
            copyBtn.style.display = 'none';

            const ext = originalName.split('.').pop().toLowerCase();
            const isCode = ['js', 'py', 'go', 'java', 'cpp', 'c', 'html', 'css', 'json', 'xml', 'sql', 'sh', 'md', 'txt'].includes(ext);
            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);
            const isText = ['txt', 'md', 'log', 'csv'].includes(ext);

            try {
                if (isCode || isImage || isText) {
                    const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
                    
                    if (isImage) {
                        modalBody.innerHTML = `<img src="${proxyUrl}" class="preview-image" />`;
                    } else {
                        const response = await fetch(proxyUrl);
                        const content = await response.text();
                        currentPreviewFile.content = content;
                        copyBtn.style.display = 'flex';
                        
                        if (isCode) {
                            const langMap = {
                                'js': 'javascript', 'ts': 'typescript', 'py': 'python',
                                'go': 'go', 'java': 'java', 'cpp': 'cpp', 'c': 'c',
                                'html': 'markup', 'css': 'css', 'json': 'json',
                                'xml': 'markup', 'sql': 'sql', 'sh': 'bash',
                                'md': 'markdown', 'txt': 'none'
                            };
                            const language = langMap[ext] || 'none';
                            modalBody.innerHTML = `<pre class="line-numbers code-viewer"><code class="language-${language}">${escapeHtml(content)}</code></pre>`;
                            Prism.highlightElement(modalBody.querySelector('code'));
                        } else {
                            modalBody.innerHTML = `<div class="preview-text">${escapeHtml(content)}</div>`;
                        }
                    }
                } else {
                    modalBody.innerHTML = `<div style="padding: 20px; color: var(--text-dim);">Preview not available for this file type.</div>`;
                }
            } catch (error) {
                modalBody.innerHTML = `<div style="padding: 20px; color: #ef4444;">Error loading preview: ${error.message}</div>`;
            }

            modal.classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function downloadCurrentFile() {
            downloadFile(currentPreviewFile.url, currentPreviewFile.name);
        }

        async function copyCurrentFileContent() {
            if (!currentPreviewFile.content) return;
            
            try {
                await navigator.clipboard.writeText(currentPreviewFile.content);
                const copyBtn = document.getElementById('copyBtn');
                const originalHtml = copyBtn.innerHTML;
                
                copyBtn.innerHTML = `<i data-lucide="check" size="14"></i> Copied!`;
                lucide.createIcons();
                copyBtn.classList.add('success');
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    lucide.createIcons();
                    copyBtn.classList.remove('success');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal when clicking outside
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') {
                closePreview();
            }
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Initial load and periodic refresh
        loadFiles();
        setInterval(loadFiles, 15000);
    </script>
