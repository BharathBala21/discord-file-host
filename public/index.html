<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord File Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }
        
        .upload-area input {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        
        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        
        #status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        #status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .files-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .files-section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            font-size: 12px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            color: #999;
            font-size: 11px;
        }
        
        .stat-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .file-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .file-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .file-item:hover {
            background: #f0f1f5;
        }
        
        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        
        .file-name {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
        }
        
        .file-name:hover {
            text-decoration: underline;
        }
        
        .file-size {
            color: #999;
            font-size: 12px;
            white-space: nowrap;
            margin-left: 8px;
        }
        
        .file-actions {
            display: flex;
            gap: 6px;
            margin-left: 12px;
        }
        
        .btn-download, .btn-delete {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .btn-download {
            background: #667eea;
            color: white;
        }
        
        .btn-download:hover {
            background: #764ba2;
        }
        
        .btn-delete {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-delete:hover {
            background: #ff5252;
        }
        
        .btn-delete:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }
        
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #667eea;
            animation: blink 1s infinite;
            margin-right: 4px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 File Host</h1>
        <p class="subtitle">Upload files to Discord (Max 25MB)</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" multiple>
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click to upload or drag files here</div>
            <div class="upload-hint">Supported: All file types (Max 25MB)</div>
        </div>
        
        <div id="status"></div>
        
        <div class="files-section">
            <h2>📋 All Files</h2>
            
            <div class="stats" id="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Files</span>
                    <span class="stat-value" id="fileCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Size</span>
                    <span class="stat-value" id="totalSize">0 B</span>
                </div>
            </div>
            
            <div class="file-list" id="fileList">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const totalSize = document.getElementById('totalSize');

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            for (let file of files) {
                await uploadFile(file);
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                status.textContent = `⏳ Uploading ${file.name}...`;
                status.className = '';
                status.style.display = 'block';

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    status.textContent = `✅ ${file.name} uploaded!`;
                    status.className = 'success';
                    loadFiles();
                } else {
                    status.textContent = `❌ Error: ${data.error}`;
                    status.className = 'error';
                }
            } catch (error) {
                status.textContent = `❌ Error: ${error.message}`;
                status.className = 'error';
            }

            fileInput.value = '';
        }

        async function loadFiles() {
            try {
                const response = await fetch('/files');
                const data = await response.json();

                if (data.files.length === 0) {
                    fileList.innerHTML = '<div class="empty-state">No files uploaded yet</div>';
                    fileCount.textContent = '0';
                    totalSize.textContent = '0 B';
                    return;
                }

                let totalBytes = 0;
                fileList.innerHTML = data.files.map(file => {
                    totalBytes += file.size;
                    return `
                        <div class="file-item">
                            <div class="file-info">
                                <a href="${file.url}" class="file-name" target="_blank" download>${file.name}</a>
                                <span class="file-size">${formatBytes(file.size)}</span>
                            </div>
                            <div class="file-actions">
                                <button class="btn-download" onclick="downloadFile('${file.url}', '${file.name}')">⬇️ Download</button>
                                <button class="btn-delete" onclick="deleteFile('${file.messageId}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                }).join('');

                fileCount.textContent = data.files.length;
                totalSize.textContent = formatBytes(totalBytes);

            } catch (error) {
                fileList.innerHTML = '<div class="empty-state">Error loading files</div>';
            }
        }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function deleteFile(messageId) {
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                status.textContent = '⏳ Deleting file...';
                status.className = '';
                status.style.display = 'block';

                const response = await fetch(`/files/${messageId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    status.textContent = '✅ File deleted!';
                    status.className = 'success';
                    loadFiles();
                } else {
                    status.textContent = `❌ Error: ${data.error}`;
                    status.className = 'error';
                }
            } catch (error) {
                status.textContent = `❌ Error: ${error.message}`;
                status.className = 'error';
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Load files on page load
        loadFiles();
        
        // Refresh file list every 5 seconds
        setInterval(loadFiles, 5000);
    </script>
</body>
</html>
